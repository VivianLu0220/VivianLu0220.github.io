<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat with Me — Jiawei Lu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,300;0,400;0,600;0,700;1,400&family=Cormorant+Garamond:ital,wght@1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F0F6FF;
      --surface: #FFFFFF;
      --blue: #4A90D9;
      --blue-light: #D0E2F7;
      --blue-deep: #2B6CB0;
      --slate: #6B8DB5;
      --slate-light: #E8F0FA;
      --teal: #5BA4B5;
      --sky: #A3D4E8;
      --text: #1E3A5F;
      --text-soft: #5A7A9A;
      --border: #D0DEF0;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ── NAV ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0;
      z-index: 100;
      background: rgba(240,246,255,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 3rem;
    }

    .nav-logo { display:flex; align-items:center; text-decoration:none; }
    .nav-logo img { height:36px; width:36px; object-fit:contain; }
    .nav-logo-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.05rem; font-style: italic;
      letter-spacing: 0.1em; color: var(--text);
    }

    .nav-links { display: flex; gap: 1.8rem; }
    .nav-links a {
      font-size: 0.72rem; font-weight: 600;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--text-soft); text-decoration: none;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--blue); }
    .nav-links a.active { color: var(--blue); }

    /* ── FLOATING BUBBLES ── */
    .bubbles { position:fixed; inset:0; pointer-events:none; overflow:hidden; z-index:0; }
    .bubble { position:absolute; border-radius:50%; opacity:0.12; animation: floatUp linear infinite; }
    @keyframes floatUp {
      0% { transform: translateY(100vh) scale(0.8); opacity:0; }
      10% { opacity:0.12; } 90% { opacity:0.12; }
      100% { transform: translateY(-20vh) scale(1.1); opacity:0; }
    }
    .b1 { width:80px; height:80px; background:var(--blue-light); left:10%; animation-duration:12s; }
    .b2 { width:50px; height:50px; background:var(--slate); left:25%; animation-duration:15s; animation-delay:2s; }
    .b3 { width:100px; height:100px; background:var(--teal); left:50%; animation-duration:18s; animation-delay:4s; }
    .b4 { width:60px; height:60px; background:var(--sky); left:75%; animation-duration:13s; animation-delay:1s; }
    .b5 { width:40px; height:40px; background:var(--blue-light); left:88%; animation-duration:16s; animation-delay:6s; }

    /* ── CHAT CONTAINER ── */
    .chat-wrap {
      position: relative; z-index: 1;
      display: flex; flex-direction: column;
      height: 100vh;
      max-width: 720px;
      margin: 0 auto;
      padding-top: 60px; /* nav height */
    }

    /* ── MESSAGES ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* Welcome message */
    .welcome {
      text-align: center;
      padding: 3rem 1rem 2rem;
      animation: fadeIn 0.6s ease;
    }

    .welcome-emoji { font-size: 3rem; margin-bottom: 1rem; display: block; }
    .welcome h2 {
      font-size: 1.4rem; font-weight: 700; margin-bottom: 0.5rem;
    }
    .welcome h2 span {
      background: linear-gradient(135deg, var(--blue), var(--teal));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .welcome p { font-size: 0.85rem; color: var(--text-soft); line-height: 1.6; }

    @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

    /* Message bubbles */
    .msg {
      display: flex;
      animation: fadeIn 0.3s ease;
    }

    .msg-user { justify-content: flex-end; }
    .msg-bot { justify-content: flex-start; }

    .msg-bubble {
      max-width: 75%;
      padding: 0.75rem 1rem;
      border-radius: 18px;
      font-size: 0.88rem;
      line-height: 1.6;
      word-break: break-word;
      white-space: pre-wrap;
    }

    .msg-user .msg-bubble {
      background: linear-gradient(135deg, var(--blue) 0%, var(--blue-deep) 100%);
      color: white;
      border-bottom-right-radius: 6px;
    }

    .msg-bot .msg-bubble {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-bottom-left-radius: 6px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    }

    /* Typing indicator */
    .typing-indicator {
      display: flex; gap: 4px; padding: 0.75rem 1rem;
      align-items: center;
    }
    .typing-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--slate);
      animation: typingBounce 1.2s ease-in-out infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.15s; }
    .typing-dot:nth-child(3) { animation-delay: 0.3s; }
    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    /* ── INPUT ── */
    .input-area {
      padding: 0.8rem 1rem 1.2rem;
      display: flex;
      gap: 0.6rem;
      align-items: flex-end;
      background: rgba(240,246,255,0.8);
      backdrop-filter: blur(8px);
    }

    .input-area textarea {
      flex: 1;
      resize: none;
      border: 1.5px solid var(--border);
      border-radius: 16px;
      padding: 0.75rem 1rem;
      font-family: 'Nunito', sans-serif;
      font-size: 0.88rem;
      color: var(--text);
      background: var(--surface);
      outline: none;
      max-height: 120px;
      line-height: 1.5;
      transition: border-color 0.2s;
    }
    .input-area textarea:focus { border-color: var(--blue); }
    .input-area textarea::placeholder { color: var(--text-soft); }

    .send-btn {
      width: 42px; height: 42px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, var(--blue), var(--blue-deep));
      color: white;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 2px 8px rgba(43,108,176,0.3);
    }
    .send-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(43,108,176,0.4); }
    .send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* ── DISCLAIMER ── */
    .disclaimer {
      text-align: center;
      font-size: 0.62rem;
      color: var(--text-soft);
      padding: 0 1rem 0.6rem;
      opacity: 0.7;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      nav { padding: 1rem 1.2rem; }
      .messages { padding: 1rem 0.6rem; }
      .msg-bubble { max-width: 85%; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">
      <img src="logo.png" alt="Jiawei Lu" onerror="this.style.display='none'; this.nextElementSibling.style.display='inline';" />
      <span class="nav-logo-text" style="display:none;">Way</span>
    </a>
    <div class="nav-links">
      <a href="cv.html">CV</a>
      <a href="flowers.html">Flowers</a>
      <a href="chat.html" class="active">Chat</a>
    </div>
  </nav>

  <div class="bubbles" aria-hidden="true">
    <div class="bubble b1"></div>
    <div class="bubble b2"></div>
    <div class="bubble b3"></div>
    <div class="bubble b4"></div>
    <div class="bubble b5"></div>
  </div>

  <div class="chat-wrap">
    <div class="messages" id="messages">
      <div class="welcome">
        <span class="welcome-emoji">⚡</span>
        <h2>Chat with <span>带电粒子</span></h2>
        <p>
          基于 75,000+ 条真实对话数据蒸馏的数字镜像。<br/>
          说点什么吧，用中文或英文都行。
        </p>
      </div>
    </div>

    <div class="input-area">
      <textarea
        id="userInput"
        rows="1"
        placeholder="说点什么…"
        autocomplete="off"
      ></textarea>
      <button class="send-btn" id="sendBtn" aria-label="Send">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
    <div class="disclaimer">AI 生成内容，不代表本人实时观点 · Powered by Claude</div>
  </div>

<script>
// ─── CONFIG ───
const API_URL = 'https://ljw-chat.fayette0302.workers.dev/chat';
// ↑ 部署 Cloudflare Worker 后替换为你的 Worker URL

const messagesEl = document.getElementById('messages');
const inputEl    = document.getElementById('userInput');
const sendBtn    = document.getElementById('sendBtn');

let history = [];
let isStreaming = false;

// ─── AUTO-RESIZE TEXTAREA ───
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
});

// ─── SEND ───
inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});
sendBtn.addEventListener('click', sendMessage);

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || isStreaming) return;

  // Add user message
  appendMessage('user', text);
  history.push({ role: 'user', content: text });
  inputEl.value = '';
  inputEl.style.height = 'auto';

  // Show typing indicator
  isStreaming = true;
  sendBtn.disabled = true;
  const typingEl = showTyping();

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history }),
    });

    if (!res.ok) {
      const err = await res.text();
      throw new Error(err || `HTTP ${res.status}`);
    }

    // Remove typing indicator, add bot bubble
    typingEl.remove();
    const botBubble = appendMessage('bot', '');

    // Stream response
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let fullText = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      const chunk = decoder.decode(value, { stream: true });
      // Parse SSE
      const lines = chunk.split('\n');
      for (const line of lines) {
        if (line.startsWith('data: ')) {
          const data = line.slice(6);
          if (data === '[DONE]') continue;
          try {
            const parsed = JSON.parse(data);
            if (parsed.text) {
              fullText += parsed.text;
              botBubble.querySelector('.msg-bubble').textContent = fullText;
              scrollToBottom();
            }
          } catch {
            // Not JSON, treat as plain text
            fullText += data;
            botBubble.querySelector('.msg-bubble').textContent = fullText;
            scrollToBottom();
          }
        }
      }
    }

    history.push({ role: 'assistant', content: fullText });

    // Keep history manageable (last 30 messages)
    if (history.length > 30) {
      history = history.slice(-30);
    }

  } catch (err) {
    typingEl.remove();
    appendMessage('bot', '啊…出了点问题。。刷新一下试试？\n\n(' + err.message + ')');
  } finally {
    isStreaming = false;
    sendBtn.disabled = false;
    inputEl.focus();
  }
}

// ─── DOM HELPERS ───
function appendMessage(role, text) {
  // Remove welcome on first message
  const welcome = messagesEl.querySelector('.welcome');
  if (welcome) welcome.remove();

  const div = document.createElement('div');
  div.className = `msg msg-${role}`;
  div.innerHTML = `<div class="msg-bubble">${escapeHtml(text)}</div>`;
  messagesEl.appendChild(div);
  scrollToBottom();
  return div;
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'msg msg-bot';
  div.innerHTML = `
    <div class="msg-bubble typing-indicator">
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
    </div>`;
  messagesEl.appendChild(div);
  scrollToBottom();
  return div;
}

function scrollToBottom() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function escapeHtml(text) {
  const el = document.createElement('span');
  el.textContent = text;
  return el.innerHTML;
}
</script>
</body>
</html>
