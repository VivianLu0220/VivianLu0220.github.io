<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>金主打钱区</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,300;0,400;0,600;0,700;1,400&family=Cormorant+Garamond:ital,wght@1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F0F6FF;
      --surface: #FFFFFF;
      --blue: #4A90D9;
      --blue-light: #D0E2F7;
      --blue-deep: #2B6CB0;
      --slate: #6B8DB5;
      --slate-light: #E8F0FA;
      --teal: #5BA4B5;
      --sky: #A3D4E8;
      --text: #1E3A5F;
      --text-soft: #5A7A9A;
      --border: #D0DEF0;
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    nav {
      position: fixed; top: 0; left: 0; right: 0;
      z-index: 100;
      background: rgba(240,246,255,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 3rem;
    }

    .nav-logo { display:flex; align-items:center; text-decoration:none; }
    .nav-logo img { height:36px; width:36px; object-fit:contain; }
    .nav-logo-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.05rem; font-style: italic;
      letter-spacing: 0.1em; color: var(--text);
    }

    .nav-links { display: flex; gap: 1.8rem; align-items: center; }
    .nav-links a {
      font-size: 0.72rem; font-weight: 600;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--text-soft); text-decoration: none;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--blue); }
    .nav-links a.active { color: var(--blue); }

    .bubbles { position:fixed; inset:0; pointer-events:none; overflow:hidden; z-index:0; }
    .bubble { position:absolute; border-radius:50%; opacity:0.12; animation: floatUp linear infinite; }
    @keyframes floatUp {
      0% { transform: translateY(100vh) scale(0.8); opacity:0; }
      10% { opacity:0.12; } 90% { opacity:0.12; }
      100% { transform: translateY(-20vh) scale(1.1); opacity:0; }
    }
    .b1 { width:80px; height:80px; background:var(--blue-light); left:10%; animation-duration:12s; }
    .b2 { width:50px; height:50px; background:var(--slate); left:25%; animation-duration:15s; animation-delay:2s; }
    .b3 { width:100px; height:100px; background:var(--teal); left:50%; animation-duration:18s; animation-delay:4s; }
    .b4 { width:60px; height:60px; background:var(--sky); left:75%; animation-duration:13s; animation-delay:1s; }
    .b5 { width:40px; height:40px; background:var(--blue-light); left:88%; animation-duration:16s; animation-delay:6s; }

    .page {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 7rem 1.5rem 3rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.5rem 2rem;
      max-width: 600px; width: 100%;
      box-shadow: 0 4px 24px rgba(74,144,217,0.08);
      text-align: center;
    }

    .card h1 {
      font-size: 1.5rem; font-weight: 700;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, var(--blue), var(--teal));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .card p {
      font-size: 0.88rem; color: var(--text-soft);
      line-height: 1.7; margin-bottom: 2rem;
    }

    .qr-grid {
      display: flex; gap: 2rem;
      justify-content: center; flex-wrap: wrap;
    }

    .qr-item {
      display: flex; flex-direction: column; align-items: center; gap: 0.7rem;
    }

    .qr-item img {
      width: 180px; height: 180px;
      object-fit: contain;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.5rem;
      background: #fff;
    }

    .qr-label {
      font-size: 0.8rem; font-weight: 600;
      letter-spacing: 0.05em;
      color: var(--text-soft);
    }

    .back-link {
      margin-top: 2rem;
      font-size: 0.78rem; color: var(--text-soft);
      text-decoration: none;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--blue); }

    @media (max-width: 600px) {
      nav { padding: 1rem 1.2rem; }
      .qr-item img { width: 140px; height: 140px; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="../index.html" class="nav-logo">
      <img src="../logo.png" alt="Jiawei Lu" onerror="this.style.display='none'; this.nextElementSibling.style.display='inline';" />
      <span class="nav-logo-text" style="display:none;">Way</span>
    </a>
    <div class="nav-links">
      <a href="../cv.html">CV</a>
      <a href="../flowers.html">Flowers</a>
      <a href="../chat.html">Chat</a>
    </div>
  </nav>

  <div class="bubbles" aria-hidden="true">
    <div class="bubble b1"></div>
    <div class="bubble b2"></div>
    <div class="bubble b3"></div>
    <div class="bubble b4"></div>
    <div class="bubble b5"></div>
  </div>

  <div class="page">
    <div class="card">
      <h1>资助 GPU</h1>
      <p>
        贴吧.爱.jpg<br/>
        谢谢亲亲
      </p>
      <div class="qr-grid">
        <div class="qr-item">
          <img src="zfb.jpg" alt="支付宝" />
          <span class="qr-label">支付宝</span>
        </div>
        <div class="qr-item">
          <img src="zelle.jpg" alt="Zelle" />
          <span class="qr-label">Zelle</span>
        </div>
      </div>
    </div>
    <a href="../chat.html" class="back-link">← 返回聊天</a>
  </div>

</body>
</html>
